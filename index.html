<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>중고등부 학생관리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://hangeul.pstatic.net/hangeul_static/css/maru-buri.css">
<style>
html,body{overflow-x:hidden;max-width:100%}
body{margin:0;background:#e9e6df;font-family:Pretendard,system-ui,sans-serif}
*{box-sizing:border-box;min-width:0}
input,textarea,select,button{font-family:inherit}
textarea:focus,input:focus,select:focus{outline:2px solid #2e5d47;outline-offset:1px}
.app-shell,.auth-shell{width:100%;margin:0 auto;background:#faf8f3;box-shadow:0 0 40px rgba(33,31,26,.15)}
.app-shell{max-width:1180px}
.auth-shell{max-width:560px}
.dashboard-card-grid{display:grid!important;grid-template-columns:1fr;gap:8px!important}
.attendance-class-grid{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important}
.teacher-attendance-grid{display:grid!important;grid-template-columns:1fr;gap:8px!important}
.event-date-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.event-time-field{grid-column:1/-1}
.calendar-cell{min-height:54px}
@keyframes sectionReveal{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@media (min-width:768px){
  .dashboard-card-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  .attendance-class-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}
  .teacher-attendance-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important}
  .event-date-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
  .event-time-field{grid-column:auto}
  .calendar-cell{min-height:72px!important;padding-top:10px!important}
}
@media (min-width:1100px){
  .attendance-class-grid{grid-template-columns:repeat(4,minmax(0,1fr))!important}
  .teacher-attendance-grid{grid-template-columns:repeat(3,minmax(0,1fr))!important}
  .calendar-cell{min-height:82px!important}
}
@media (prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;animation:none!important;transition:none!important}}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
</head>
<body>
<div id="app"></div>
<script src="app.js"></script>
</body>
</html>
